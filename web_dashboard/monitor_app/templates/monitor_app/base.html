<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NetMonitor Pro{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #12141c; /* Fondo oscuro texturizado */
            color: #e3e6ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background-color: #1a1d29;
            border-bottom: 1px solid #2d3248;
        }
        .bg-purple {
            color: #af40ff;
        }
        /* Personalización de la barra de desplazamiento (Scrollbar) estilo geek */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #12141c;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3248;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f4769;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-warning d-flex align-items-center" href="{% url 'dashboard' %}">
                <i class="fa-solid fa-tower-broadcast me-2 text-info animate-pulse"></i>
                NetMonitor <span class="text-white font-monospace ms-1" style="font-size: 0.8rem; letter-spacing: 1px;">PRO</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link active d-flex align-items-center" href="{% url 'dashboard' %}">
                            <i class="fa-solid fa-server me-1ce text-muted"></i> Panel de Nodos
                        </a>
                    </li>
                    <li class="nav-item">
                        <span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1d font-monospace">
                            <i class="fa-solid fa-circle-check me-1"></i> Escáner Activo
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center text-muted small py-4 mt-5 border-top border-secondary" style="border-color: rgba(255,255,255,0.05) !important;">
        <div class="container">
            <p class="mb-0 font-monospace">Orquestación de Workers en tiempo real &copy; 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
